<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Tiny Multiscreen All-Exam CUDA Train Loss Curve</title>
  <desc id="desc">Training cross-entropy loss over 80 CUDA release-training steps on the extracted TCAS68 all-exam training split. Test data is evaluated once after training.</desc>
