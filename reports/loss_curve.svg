    <text x="45" y="220">6</text>
    <line x1="70" y1="157.1" x2="870" y2="157.1" stroke="#e5e7eb"/>
    <text x="45" y="161">7</text>
    <line x1="70" y1="98.6" x2="870" y2="98.6" stroke="#e5e7eb"/>
    <text x="45" y="103">8</text>
    <line x1="70" y1="40.0" x2="870" y2="40.0" stroke="#e5e7eb"/>
